<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今晚吃什麼？- 多地區客製化轉盤</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --accent-color: #ff4757;
            --bg-color: #f1f2f6;
            --success-color: #2ed573;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: row;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            gap: 40px;
            max-width: 950px;
            width: 100%;
        }

        /* 左側設定區 */
        .settings-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h2 { color: #333; margin-top: 0; margin-bottom: 15px; }
        
        label { font-size: 14px; font-weight: bold; color: #666; margin-bottom: 5px; }

        /* 地區切換與新增功能 */
        .region-select-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            background: white;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: #357abd; }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 5px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .menu-item:last-child { border-bottom: none; }

        .btn-delete { background-color: transparent; color: var(--accent-color); padding: 5px 10px; }
        .btn-delete:hover { background-color: #ffeae6; }

        /* 右側轉盤區 */
        .wheel-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            margin-bottom: 25px;
        }

        #wheel {
            border: 6px solid #2c3e50;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--accent-color);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .btn-spin {
            background-color: var(--success-color);
            color: white;
            font-size: 20px;
            padding: 12px 40px;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
        }
        .btn-spin:hover { background-color: #26af5f; }
        .btn-spin:disabled { background-color: #a4b0be; cursor: not-allowed; box-shadow: none; }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            height: 30px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            #wheel { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 左邊：名單管理與地區切換 -->
    <div class="settings-panel">
        <h2>美食名單設定</h2>
        
        <!-- 地區選擇與新增地區 -->
        <label>選擇目前所在地區</label>
        <div class="region-select-group">
            <select id="region-select">
                <!-- 動態載入地區選項 -->
            </select>
        </div>

        <label>新增自訂地區</label>
        <div class="input-group">
            <input type="text" id="new-region-input" placeholder="例如：公司附近、中山站..." maxlength="10">
            <button class="btn-primary" id="add-region-btn">新增地區</button>
        </div>

        <hr style="width:100%; border:0; border-top:1px solid #eee; margin:15px 0;">

        <!-- 該地區的食物管理 -->
        <label id="food-list-label">目前地區的晚餐清單</label>
        <div class="input-group" style="margin-top:5px;">
            <input type="text" id="food-input" placeholder="輸入想吃的食物..." maxlength="10">
            <button class="btn-primary" id="add-food-btn">新增食物</button>
        </div>
        <ul class="menu-list" id="menu-list">
            <!-- 動態產生食物選項 -->
        </ul>
    </div>

    <!-- 右邊：轉盤本體 -->
    <div class="wheel-panel">
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="360" height="360"></canvas>
        </div>
        <button class="btn-spin" id="spin-btn">開始旋轉</button>
        <div id="result"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const regionSelect = document.getElementById('region-select');
    const newRegionInput = document.getElementById('new-region-input');
    const addRegionBtn = document.getElementById('add-region-btn');
    const foodInput = document.getElementById('food-input');
    const addFoodBtn = document.getElementById('add-food-btn');
    const menuListUl = document.getElementById('menu-list');
    const spinBtn = document.getElementById('spin-btn');
    const resultDiv = document.getElementById('result');
    const foodListLabel = document.getElementById('food-list-label');

    // 1. 預設的資料結構 (以地區為 Key)
    const defaultData = {
        "捷運中山國中站": ["燒臘", "八方雲集", "拉麵", "河粉", "自助餐"],
        "捷運中山站": ["日式拉麵", "炙燒壽司", "義大利麵", "韓式炸雞", "網美下午茶"],
        "捷運忠孝敦化": ["巷口乾麵", "大呼過癮火鍋", "麥當勞", "鹹酥雞", "水餃"]
    };

    // 從 LocalStorage 讀取，沒有的話就用預設
    let regionData = JSON.parse(localStorage.getItem('geo_dinner_data')) || defaultData;
    // 記錄當前選擇的地區，預設為資料裡的第一個 Key
    let currentRegion = localStorage.getItem('current_region') || Object.keys(regionData)[0] || "";
    
    let currentRotation = 0;
    let isSpinning = false;

    const size = canvas.width;
    const center = size / 2;
    const colors = ["#ff9ff3", "#feca57", "#ffff80", "#ff6b6b", "#48dbfb", "#1dd1a1", "#a29bfe", "#ffeaa7"];

    // 2. 初始化/更新地區下拉選單
    function updateRegionSelect() {
        regionSelect.innerHTML = '';
        Object.keys(regionData).forEach(region => {
            const option = document.createElement('option');
            option.value = region;
            option.textContent = region;
            if (region === currentRegion) option.selected = true;
            regionSelect.appendChild(option);
        });
        
        if(currentRegion) {
            foodListLabel.textContent = `【${currentRegion}】的晚餐清單`;
        }
    }

    // 3. 渲染當前地區的食物列表
    function renderFoodList() {
        menuListUl.innerHTML = '';
        const options = regionData[currentRegion] || [];
        
        options.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'menu-item';
            li.innerHTML = `
                <span>${item}</span>
                <button class="btn-delete" onclick="deleteFood(${index})">刪除</button>
            `;
            menuListUl.appendChild(li);
        });
        
        // 如果該地區少於 2 個選項，則無法旋轉
        spinBtn.disabled = options.length < 2;
        
        // 同步儲存至 LocalStorage
        localStorage.setItem('geo_dinner_data', JSON.stringify(regionData));
        localStorage.setItem('current_region', currentRegion);
    }

    // 4. 繪製轉盤
    function drawWheel() {
        const options = regionData[currentRegion] || [];
        const numOptions = options.length;
        
        ctx.clearRect(0, 0, size, size);
        if (numOptions === 0) return;
        
        const arcSize = (2 * Math.PI) / numOptions;

        options.forEach((option, i) => {
            const angle = i * arcSize;
            
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(center, center);
            ctx.arc(center, center, center, angle, angle + arcSize);
            ctx.lineTo(center, center);
            ctx.fill();

            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(angle + arcSize / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#2c3e50";
            ctx.font = "bold 15px Arial";
            ctx.fillText(option, center - 25, 6);
            ctx.restore();
        });
    }

    function updateUI() {
        updateRegionSelect();
        renderFoodList();
        drawWheel();
    }

    // --- 事件監聽邏輯 ---

    // 切換地區
    regionSelect.addEventListener('change', (e) => {
        currentRegion = e.target.value;
        resultDiv.innerText = ""; // 清空上次結果
        updateUI();
    });

    // 新增地區
    addRegionBtn.addEventListener('click', () => {
        const newRegion = newRegionInput.value.trim();
        if (newRegion && !regionData[newRegion]) {
            regionData[newRegion] = []; // 初始化該地區的空陣列
            currentRegion = newRegion;   // 直接切換到新地區
            newRegionInput.value = '';
            updateUI();
        }
    });

    // 新增食物
    addFoodBtn.addEventListener('click', () => {
        const newFood = foodInput.value.trim();
        if (!currentRegion) {
            alert("請先建立或選擇一個地區！");
            return;
        }
        if (newFood && !regionData[currentRegion].includes(newFood)) {
            regionData[currentRegion].push(newFood);
            foodInput.value = '';
            updateUI();
        }
    });

    foodInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addFoodBtn.click();
    });

    // 刪除食物
    window.deleteFood = function(index) {
        if (isSpinning) return;
        regionData[currentRegion].splice(index, 1);
        updateUI();
    };

    // 5. 旋轉邏輯
    spinBtn.addEventListener('click', () => {
        const options = regionData[currentRegion] || [];
        if (isSpinning || options.length < 2) return;

        isSpinning = true;
        spinBtn.disabled = true;
        resultDiv.innerText = `正在搜尋 ${currentRegion} 的美食...`;

        const randomDegrees = Math.floor(Math.random() * 360);
        currentRotation += 1440 + randomDegrees;

        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            isSpinning = false;
            spinBtn.disabled = false;

            const actualDegrees = (360 - (currentRotation % 360)) % 360;
            const adjustedDegrees = (actualDegrees + 270) % 360;
            
            const arcIndex = Math.floor((adjustedDegrees / 360) * options.length);
            const selected = options[arcIndex];

            resultDiv.innerText = `🎉 決定了！去吃：${selected} 🎉`;
        }, 4000);
    });

    // 初始化啟動
    updateUI();
</script>

</body>
</html>
